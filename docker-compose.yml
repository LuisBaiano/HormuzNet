version: '3.8'

services:
  broker1:
    build:
      context: ./code
      dockerfile: Dockerfile.broker
    container_name: hormuznet_broker1
    command: ["-id=B1","-setor=Setor_Noroeste","-udp=224.0.0.1:8080","-tcp=0.0.0.0:6000","-vizinhos=broker2:6001,broker8:6007,broker9:6008"]
    networks:
      - hormuznet
    restart: on-failure

  broker2:
