    container_name: hormuznet_drone_nw_1
    command: ["-id=Drone_NW_1","-brokers=broker1:6000,broker8:6007","-x=250","-y=250"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4
      - broker5
      - broker6
      - broker7
      - broker8
