version: '3.8'

services:
  broker1:
    build:
      context: ./code
      dockerfile: Dockerfile.broker
    container_name: hormuznet_broker1
    command: ["-id=B1","-setor=Setor_Noroeste","-udp=224.0.0.1:8080","-tcp=0.0.0.0:6000","-vizinhos=broker2:6001,broker3:6002"]
    networks:
      - hormuznet
    restart: on-failure

  broker2:
    build:
      context: ./code
      dockerfile: Dockerfile.broker
    container_name: hormuznet_broker2
    command: ["-id=B2","-setor=Setor_Nordeste","-udp=224.0.0.1:8080","-tcp=0.0.0.0:6001","-vizinhos=broker1:6000,broker4:6003"]
    networks:
      - hormuznet
    restart: on-failure

  broker3:
    build:
      context: ./code
      dockerfile: Dockerfile.broker
    container_name: hormuznet_broker3
    command: ["-id=B3","-setor=Setor_Sudoeste","-udp=224.0.0.1:8080","-tcp=0.0.0.0:6002","-vizinhos=broker1:6000,broker4:6003"]
    networks:
      - hormuznet
    restart: on-failure

  broker4:
    build:
      context: ./code
      dockerfile: Dockerfile.broker
    container_name: hormuznet_broker4
    command: ["-id=B4","-setor=Setor_Sudeste","-udp=224.0.0.1:8080","-tcp=0.0.0.0:6003","-vizinhos=broker2:6001,broker3:6002"]
    networks:
      - hormuznet
    restart: on-failure

  drone1:
    build:
      context: ./code
      dockerfile: Dockerfile.drone
    container_name: hormuznet_drone_nw_1
    command: ["-id=Drone_NW_1","-brokers=broker1:6000,broker2:6001","-x=250","-y=250"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4

  drone2:
    build:
      context: ./code
      dockerfile: Dockerfile.drone
    container_name: hormuznet_drone_nw_2
    command: ["-id=Drone_NW_2","-brokers=broker1:6000,broker3:6002","-x=300","-y=300"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4

  drone3:
    build:
      context: ./code
      dockerfile: Dockerfile.drone
    container_name: hormuznet_drone_ne_1
    command: ["-id=Drone_NE_1","-brokers=broker2:6001,broker1:6000","-x=750","-y=250"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4

  drone4:
    build:
      context: ./code
      dockerfile: Dockerfile.drone
    container_name: hormuznet_drone_ne_2
    command: ["-id=Drone_NE_2","-brokers=broker2:6001,broker4:6003","-x=800","-y=300"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4

  drone5:
    build:
      context: ./code
      dockerfile: Dockerfile.drone
    container_name: hormuznet_drone_sw_1
    command: ["-id=Drone_SW_1","-brokers=broker3:6002,broker1:6000","-x=250","-y=750"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4

  drone6:
    build:
      context: ./code
      dockerfile: Dockerfile.drone
    container_name: hormuznet_drone_se_1
    command: ["-id=Drone_SE_1","-brokers=broker4:6003,broker2:6001","-x=750","-y=750"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4

  monitor:
    build:
      context: ./code
      dockerfile: Dockerfile.monitor
    container_name: hormuznet_monitor
    command: ["-brokers=broker1:6000,broker2:6001,broker3:6002,broker4:6003", "-porta=8082"]
    ports:
      - "8082:8082"
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1
      - broker2
      - broker3
      - broker4

  sensor_1:
    build:
      context: ./code
      dockerfile: Dockerfile.sensor
    container_name: hormuznet_radar_nw_1
    command: ["-id=radar_nw_1","-tipo=radar","-setor=Setor_Noroeste","-broker=224.0.0.1:8080","-intervalo=1000", "-x=286", "-y=100"]
    networks:
      - hormuznet
    restart: on-failure
    depends_on:
      - broker1

